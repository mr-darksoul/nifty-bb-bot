name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # Tests mock KiteTicker and need no Kite credentials. `discover` picks up
      # every backend/test_*.py, so new tests are run automatically.
      - name: Run unit tests
        run: |
          cd backend
          python -m unittest discover -p "test_*.py" -v
