name: Weekly Model Retraining

on:
  schedule:
    # Every Friday at 18:00 IST = 12:30 UTC
    - cron: "30 12 * * 5"
  workflow_dispatch:
    inputs:
      months:
        description: "Months of historical data"
        required: false
        default: "9"
      trials:
        description: "Optuna optimization trials"
        required: false
        default: "200"

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run training pipeline
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
        run: |
          cd backend
          python ml/train.py \
            --months ${{ github.event.inputs.months || '9' }} \
            --trials ${{ github.event.inputs.trials || '200' }}

      - name: Commit updated model artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            backend/ml/models/regime_model.joblib \
            backend/ml/models/signal_filter_model.joblib \
            backend/ml/models/optimized_params.json \
            backend/nifty_5min.csv || true

          if git diff --staged --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore: weekly model retrain $(date -u +%Y-%m-%d)"
            git push origin main
          fi
